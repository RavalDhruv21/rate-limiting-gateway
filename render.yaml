services:
  - type: web
    name: rate-limited-gateway
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # Paste from Neon dashboard
      - key: REDIS_URL
        sync: false        # Paste from Upstash dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: UPSTREAM_BASE_URL
        value: https://httpbin.org
      - key: LOG_LEVEL
        value: INFO
